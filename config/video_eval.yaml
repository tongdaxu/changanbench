datasets: [xiph_video]
codecs:
  - h264_q0
  - h264_q1
  - h264_q2
  - h264_q3
  - h264_q4
  - h265_q0
  - h265_q1
  - h265_q2
  - h265_q3
  - h265_q4
  - h266_q0
  - h266_q1
  - h266_q2
  - h266_q3
  - h266_q4
  - dcvc_q0
  - dcvc_tcm_q0
  - dcvc_hem_q0
  - dcvc_dc_q0
  - dcvc_fm_q0
  - dcvc_rt_q0
metrics: [psnr, ssim, lpips, vggt]

# ============ Datasets ============
xiph_video:
  type: cab.dataset.xiph_dataset.XiphVideoDataset
  params:
    samples:
    - bus_cif
    root: ./cache/xiph
    clip_len: 32
    image_size: 256
    zero_mean: false
    sampling: uniform
    download: true

# ============ Traditional Video Codecs ============
h264_q0:
  type: cab.codec.video_ffmpeg_video.FFmpegVideoCodec
  params:
    codec: libx264
    crf: 38
    preset: slow
    fps: 30
    pix_fmt: yuv420p
    container_ext: .mp4
    ffmpeg_path: ./tools/ffmpeg/bin/ffmpeg
    dataset_zero_mean: false
    metrics_zero_mean: false

