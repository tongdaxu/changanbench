# Dedicated config for CAB pairwise video evaluation.
#
# Run example:
#   python video_pair_test.py --config config/video_pair_eval.yaml --cache_dir ./cache_video
#
# Replace the placeholder paths below with real reference/distorted videos.

datasets: [reference_video]
codecs: [distorted_video]
metrics: [psnr, ssim, msssim, lpips, vggt]

reference_video:
  path: /path/to/reference_or_lossless_video.mp4

distorted_video:
  path: /path/to/compressed_video.mp4

psnr:
  type: cab.evaluations.video_metrics.PSNRFrameMetric
  params:
    zero_mean: false

ssim:
  type: cab.evaluations.video_metrics.SSIMFrameMetric
  params:
    zero_mean: false

msssim:
  type: cab.evaluations.video_metrics.SSIMFrameMetric
  params:
    zero_mean: false

lpips:
  type: cab.evaluations.video_metrics.LPIPSFrameMetric
  params:
    zero_mean: false
    network_type: alex

vggt:
  type: cab.evaluations.video_vggt.VGGTVideoMetric
  params:
    ckpt_path: /path/to/vggt/model.pt
    device: cuda
    frame_count: 32
    mode: crop

