metrics:
  - psnr
  - ssim
  - lpips
  - dists
  - fid
  - fvd
  - vggt
  - complexity

psnr:
  type: cab.evaluations.psnr.PSNRMetric
  params:
    zero_mean: false
ssim:
  type: cab.evaluations.ssim.SSIMMetric
  params:
    zero_mean: false
lpips:
  type: cab.evaluations.lpips.LPIPSMetric
  params:
    zero_mean: false
    network_type: alex
dists:
  type: cab.evaluations.dists.DISTSMetric
  params:
    zero_mean: false
fid:
  type: cab.evaluations.fid.get_fid.FIDMetric
  params:
    zero_mean: false
fvd:
  type: cab.evaluations.video_ddp.FVDMetric
  params:
    clip_length: 16
    clip_stride: 16
    device: cuda
vggt:
  type: cab.evaluations.video_vggt.VGGTMetric
  params:
    ckpt_path: checkpoints/vggt/model.pt
    device: cuda
    score: camera_center_error_mean
complexity:
  type: cab.evaluations.complexity.ComplexityMetric
  params:
    image_size: 256
    batch_size: 1
    frames: 16
    warmup: 1
    repeat: 3
